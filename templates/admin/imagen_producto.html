{% extends "admin/base_admin.html" %}

{% block title %}
Imagen producto
{% endblock %}


{% block content %}

<div class="panel">

<h2>Actualizar imagen</h2>


<form method="POST"
      enctype="multipart/form-data">


<label>
Nueva imagen:
</label>


<input 
type="file"
name="imagen"
accept=".jpg,.png,.webp"
required>


<br><br>


<button class="btn-primary">
Guardar imagen
</button>


</form>

</div>

{% endblock %}
